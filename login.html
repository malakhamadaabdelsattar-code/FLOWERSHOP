<!DOCTYPE html>

<head>

<body>
<div class="flower-rain">

  <span class="f">🌹</span>

  <span class="f">🌸</span>
  <span class="f">🌹</span>

  <span class="f">🌹</span>
</div>

<nav>
  <button id="menuToggle" onclick="openMenu()">☰</button>
  <h2>Flower Shop 🌹</h2>
  <div class="nav-actions">
    <button id="cartBtn" onclick="openCart()">🛒 <span id="cartBadge"></span></button>
    <button onclick="toggleMode()">🌙</button>
  </div>
</nav>

<!-- Side Menu -->
<div id="sideMenu">
  <button id="closeMenu" onclick="closeMenu()">✕</button>
  <div class="side-logo">🌹 Flower Shop</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="login.html">Login</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</div>

<!-- Overlay -->
<div id="menuOverlay" onclick="closeMenu(); closeCart();"></div>

<!-- Cart Modal -->
<div id="cartModal">
  <button id="closeCart" onclick="closeCart()">✕</button>
  <h2>🛒 Your Cart</h2>
  <div id="cartItems"></div>
  <div id="cartTotal">Total: $0</div>
  <button id="checkoutBtn" onclick="checkout()">Checkout ✨</button>
</div>

<!-- Toast -->
<div id="cartToast"></div>

<section class="login-section">

<div class="login-box">

<div class="robot">

<div class="eyes">
<div class="eye"><div class="pupil"></div></div>
<div class="eye"><div class="pupil"></div></div>
</div>

</div>

<h1>Login</h1>

<form>

 <input type="text" id="username" placeholder="Username" required> 
    
    <input type="password" id="password" placeholder="Password" required> 

    <button type="button" onclick="validateLogin()">Login</button>
    
    <p id="errorBox" class="error-msg"></p>
    <p id="successBox" class="success-msg"></p>
</form>

</div>
